apiVersion: batch/v1
kind: Job
metadata:
  name: init-db
  namespace: skymap
spec:
  template:
    spec:
      containers:
        - name: init-db
          image: sky_map-init-db:latest
          imagePullPolicy: Never
          env:
            - name: DB_HOST
              value: db
            - name: DB_USER
              value: sky
            - name: DB_PASS
              value: changeme
            - name: DB_DATABASE
              value: sky_map
      restartPolicy: OnFailure

