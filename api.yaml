apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: skymap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: migrate
          image: sky_map-api:latest
          imagePullPolicy: Never
          command: ["sh", "-c", "sleep 10 && python manage.py migrate"]
          env:
            - name: DB_HOST
              value: db
            - name: DB_USER
              value: root
            - name: DB_PASS
              value: yourpassword
            - name: DB_DATABASE
              value: skymap

      containers:
        - name: api
          image: sky_map-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: db
            - name: DB_USER
              value: root
            - name: DB_PASS
              value: yourpassword
            - name: DB_DATABASE
              value: skymap

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: skymap
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP

