apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: skymap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: migrate
          image: sky_map-api:latest
          imagePullPolicy: Never
          command: ["sh", "-c", "sleep 10 && python manage.py migrate"]
          env:
            - name: DB_HOST
              value: db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-password
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-name

      containers:
        - name: api
          image: sky_map-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: DB_HOST
              value: db
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-password
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db-name

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: skymap
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
