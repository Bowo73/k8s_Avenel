apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: skymap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: mariadb
          image: mariadb:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MARIADB_ROOT_PASSWORD
              value: changeme
            - name: MARIADB_DATABASE
              value: sky_map
            - name: MARIADB_USER
              value: sky
            - name: MARIADB_PASSWORD
              value: changeme
          ports:
            - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: skymap
spec:
  selector:
    app: db
  ports:
    - port: 3306

